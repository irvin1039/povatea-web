<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Pova Tea</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #f5f0e6; color: #3b2f2f; margin: 0; padding: 0; }
    header { background: #e6d3b3; padding: 20px; text-align: center; }
    header h1 { font-family: 'Lucida Handwriting', cursive; color: #5d4037; }
    
    .upload-section { max-width: 800px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; }
    .upload-section input { margin: 10px 0; }

    .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: 20px auto; }
    .gallery img, .gallery video { width: 100%; height: auto; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .gallery video { max-height: 200px; }

    footer { background: #5d4037; color: white; text-align: center; padding: 30px 0; margin-top: 30px; }
</style>
</head>
<body>

<header>
    <h1>Galería Pova Tea</h1>
</header>

<section class="upload-section">
    <h2>Sube tus fotos o videos</h2>
    <input type="file" id="fileInput" multiple accept="image/*,video/*">
    <p style="font-size:0.9rem; color:#555;">Selecciona varias imágenes o videos para agregar a la galería.</p>
</section>

<section class="gallery" id="gallery">
    <!-- IMÁGENES PRE-CARGADAS -->
    <img src="img1.jpg" alt="Bebida Pova Tea 1">
    <img src="img2.jpg" alt="Bebida Pova Tea 2">
    <img src="img3.jpg" alt="Bebida Pova Tea 3">
    <img src="img4.jpg" alt="Bebida Pova Tea 3">
	<img src="img5.jpg" alt="Bebida Pova Tea 3">
	<img src="img6.jpg" alt="Bebida Pova Tea 3">
</section>

<footer>
    © 2026 Pova Tea. Todos los derechos reservados.
</footer>

<script>
const fileInput = document.getElementById('fileInput');
const gallery = document.getElementById('gallery');

fileInput.addEventListener('change', function() {
    const files = fileInput.files;
    for(let i = 0; i < files.length; i++){
        const file = files[i];
        const url = URL.createObjectURL(file);

        if(file.type.startsWith('image/')){
            const img = document.createElement('img');
            img.src = url;
            gallery.appendChild(img);
        } else if(file.type.startsWith('video/')){
            const video = document.createElement('video');
            video.src = url;
            video.controls = true;
            gallery.appendChild(video);
        }
    }
    fileInput.value = ''; 
});
</script>

</body>
</html>
