<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pova Tea</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f0e6;
    color: #3b2f2f;
}

/* HEADER */
header {
    background: #e6d3b3;
    text-align: center;
    padding: 20px;
}

.logo {
    width: 120px;
    border-radius: 50%;
    max-width: 40%;
}

/* NAV */
nav {
    background: #d9c2a3;
    display: flex;
    justify-content: center;
    padding: 10px;
    flex-wrap: wrap;
}

nav a {
    margin: 10px 15px;
    text-decoration: none;
    color: #3b2f2f;
    font-weight: bold;
}

/* INFO */
.info-item {
    max-width: 900px;
    margin: 30px auto;
    text-align: center;
}

.info-item h2 {
    font-family: 'Lucida Handwriting', cursive;
    margin-bottom: 15px;
}

.info-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
}

/* Zig-zag solo en escritorio */
.info-item:nth-child(even) .info-content {
    flex-direction: row-reverse;
}

.info-content img {
    width: 300px;
    height: 250px;
    object-fit: cover;
    border-radius: 12px;
}

.info-content p {
    max-width: 500px;
    text-align: left;
}

/* 🔥 MOBILE FIX (AQUÍ ESTÁ LA CLAVE) */
@media (max-width: 768px) {

    .info-content {
        flex-direction: column !important;
        align-items: center;
    }

    .info-item:nth-child(even) .info-content {
        flex-direction: column !important;
    }

    .info-content img {
        width: 90%;
        height: auto;
    }

    .info-content p {
        max-width: 90%;
        text-align: justify;
    }

    nav {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<header>
    <img src="logo.png" style="width: 90%;">
</header>

<nav>
    <a href="#">Ver Menú</a>
    <a href="#">Ubícanos</a>
    <a href="#">Galería</a>
    <a href="#">Contáctanos</a>
</nav>

<section class="info">

  <div class="info-item">
    <h2>¿Qué son las Bobas?</h2>
    <div class="info-content">
      <img src="boba.jpg">
      <p>Las bobas son perlas de tapioca con textura suave y divertida.</p>
    </div>
  </div>

  <div class="info-item">
    <h2>¿Qué son los Frappés?</h2>
    <div class="info-content">
      <img src="frappe.jpg">
      <p>Bebidas frías con hielo triturado y sabores deliciosos.</p>
    </div>
  </div>

  <div class="info-item">
    <h2>¿Por qué elegir Pova Tea?</h2>
    <div class="info-content">
      <img src="ingredientes.jpg">
      <p>Usamos ingredientes de alta calidad para un sabor único.</p>
    </div>
  </div>

</section>

</body>
</html>
