<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pova Tea</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f0e6;
    color: #3b2f2f;
}

/* HEADER */
header {
    background: #e6d3b3;
    text-align: center;
    padding: 20px;
}

.logo {
    width: 120px;
    border-radius: 50%;
    max-width: 40%;
}

/* NAV */
nav {
    background: #d9c2a3;
    display: flex;
    justify-content: center;
    padding: 10px;
    flex-wrap: wrap;
}

nav a {
    margin: 10px 15px;
    text-decoration: none;
    color: #3b2f2f;
    font-weight: bold;
}

/* INFO */
.info-item {
    max-width: 900px;
    margin: 30px auto;
    text-align: center;
}

.info-item h2 {
    font-family: 'Lucida Handwriting', cursive;
    margin-bottom: 15px;
}

.info-item img {
    width: 90%;
    max-width: 300px;
    height: auto;
    border-radius: 12px;
    object-fit: cover;
    display: block;
    margin: 0 auto 15px auto;
}

.info-item p {
    max-width: 90%;
    margin: 0 auto 20px auto;
    font-size: 1rem;
    line-height: 1.5;
    text-align: justify;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .info-item img {
        width: 100%;
    }

    .info-item p {
        max-width: 95%;
    }
}

</style>
</head>

<body>

<header>
    <img src="logo.png" alt="Logo Pova Tea" class="logo">
</header>

<nav>
    <a href="#">Ver Menú</a>
    <a href="#">Ubícanos</a>
    <a href="#">Galería</a>
    <a href="#">Contáctanos</a>
</nav>

<section class="info">

  <div class="info-item">
      <h2>¿Qué son las Bobas?</h2>
      <img src="boba.jpg" alt="Bobas">
      <p>Las bobas son perlas de tapioca con textura suave y divertida.</p>
  </div>

  <div class="info-item">
      <h2>¿Qué son los Frappés?</h2>
      <img src="frappe.jpg" alt="Frappé">
      <p>Bebidas frías con hielo triturado y sabores deliciosos.</p>
  </div>

  <div class="info-item">
      <h2>¿Por qué elegir Pova Tea?</h2>
      <img src="ingredientes.jpg" alt="Ingredientes">
      <p>Usamos ingredientes de alta calidad para un sabor único.</p>
  </div>

</section>

</body>
</html>
